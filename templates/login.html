<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Ponto</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
            --text-light: #6b7280;
            --success: #10b981;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
        }

        .login-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-section h1 {
            color: var(--primary);
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .logo-section p {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text);
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: #f3f4f6;
            color: var(--text);
            border: 2px solid #e5e7eb;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        .btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-weight: 500;
            display: none;
        }

        .message.error {
            background: #fee2e2;
            color: #b91c1c;
        }

        .message.success {
            background: #d1fae5;
            color: #065f46;
        }

        .info-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #f3f4f6;
        }

        .info-title {
            font-weight: 600;
            color: var(--text);
            margin-bottom: 10px;
        }

        .info-item {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-bottom: 8px;
        }

        .info-item strong {
            color: var(--text);
        }

        .divider {
            text-align: center;
            color: var(--text-light);
            margin: 20px 0;
            font-size: 0.9rem;
        }

        .loading {
            display: none;
            text-align: center;
            margin-bottom: 20px;
        }

        .spinner {
            border: 3px solid #f3f4f6;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <h1>🕐 Sistema de Ponto</h1>
                <p>Bem-vindo ao Dashboard</p>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
            </div>

            <div id="messageDiv" class="message"></div>

            <form id="loginForm" style="display: block;" onsubmit="handleAdminLogin(event)">
                <div class="form-group">
                    <label for="email">Email (Administrador)</label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="seu@email.com"
                        required
                    >
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-primary" id="btnLogin">
                        Entrar como Admin
                    </button>
                </div>
            </form>

            <div class="divider">OU</div>

            <div class="button-group">
                <button class="btn btn-secondary" onclick="handleVisitorLogin()">
                    Acessar como Visitante
                </button>
            </div>

            <div class="info-section">
                <div class="info-title">Diferenças de Acesso:</div>
                <div class="info-item">
                    <strong>👤 Visitante:</strong><br>
                    • Histórico diário<br>
                    • Lista de voluntários
                </div>
                <div class="info-item">
                    <strong>🔐 Administrador:</strong><br>
                    • Acesso completo<br>
                    • Todas as funcionalidades
                </div>
            </div>
        </div>
    </div>

    <script>
        const messageDiv = document.getElementById('messageDiv');
        const loading = document.getElementById('loading');
        const btnLogin = document.getElementById('btnLogin');

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';

            if (type === 'success') {
                setTimeout(() => {
                    window.location.href = '/';
                }, 1500);
            }
        }

        function hideMessage() {
            messageDiv.style.display = 'none';
        }

        async function handleAdminLogin(event) {
            event.preventDefault();
            hideMessage();

            const email = document.getElementById('email').value.trim();

            if (!email) {
                showMessage('Por favor, insira um email válido', 'error');
                return;
            }

            loading.style.display = 'block';
            btnLogin.disabled = true;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage(data.mensagem, 'success');
                } else {
                    showMessage(data.mensagem || 'Erro ao fazer login', 'error');
                    btnLogin.disabled = false;
                }
            } catch (error) {
                showMessage('Erro de conexão com o servidor', 'error');
                btnLogin.disabled = false;
            } finally {
                loading.style.display = 'none';
            }
        }

        async function handleVisitorLogin() {
            loading.style.display = 'block';

            try {
                const response = await fetch('/api/login-visitante', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });

                if (response.ok) {
                    showMessage('Acesso de visitante concedido', 'success');
                } else {
                    showMessage('Erro ao acessar como visitante', 'error');
                }
            } catch (error) {
                showMessage('Erro de conexão com o servidor', 'error');
            } finally {
                loading.style.display = 'none';
            }
        }

        // Verifica se já está autenticado
        async function checkAuth() {
            try {
                const response = await fetch('/api/check-auth');
                const data = await response.json();

                if (data.autenticado) {
                    window.location.href = '/';
                }
            } catch (error) {
                console.error('Erro ao verificar autenticação:', error);
            }
        }

        // Verifica auth ao carregar a página
        window.addEventListener('load', checkAuth);
    </script>
</body>
</html>
